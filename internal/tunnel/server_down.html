<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Server Unavailable — slim</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#1a1a1a;color:hsl(0 0% 100%/85%)}
.container{text-align:center;padding:2rem;max-width:420px}
.status{font-size:5rem;font-weight:700;letter-spacing:-2px;color:hsl(0 0% 100%/10%);line-height:1}
h1{font-size:1.25rem;font-weight:600;margin:.75rem 0 .5rem;color:#fff;text-wrap:balance}
p{font-size:.9rem;color:hsl(0 0% 100%/55%);line-height:1.5;text-wrap:balance}
details{margin-top:1.25rem;text-align:left}
summary{font-size:.8rem;color:hsl(0 0% 100%/40%);cursor:pointer;text-align:center;list-style:none}
summary::-webkit-details-marker{display:none}
summary::before{content:"▶ ";font-size:.6rem;vertical-align:1px}
details[open] summary::before{content:"▼ "}
.detail-box{margin-top:.5rem;padding:.75rem 1rem;background:#232323;border:1px solid hsl(0 0% 100%/8%);border-radius:6px;font-size:.8rem;color:hsl(0 0% 100%/55%);line-height:1.5}
.footer{position:fixed;bottom:1.5rem;text-align:center;font-size:.75rem;color:hsl(0 0% 100%/40%)}
.footer a{color:hsl(0 0% 100%/40%);text-decoration:none}
.footer a:hover{color:hsl(0 0% 100%/55%);text-decoration:underline}
.footer span{margin:0 .35rem}
</style>
</head>
<body>
<div class="container">
<div class="status">502</div>
<h1>Server Unavailable</h1>
<p>The local development server behind this tunnel is not responding. Please try again later.</p>
<details>
<summary>More details</summary>
<div class="detail-box">The local server on port {{.Port}} is not responding.{{if .Error}} {{.Error}}{{end}}</div>
</details>
</div>
<div class="footer">
Served via <a href="https://slim.sh">slim</a> tunnel
<span>&middot;</span>
<a href="https://slim.sh/abuse">Report abuse</a>
</div>
</body>
</html>
